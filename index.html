<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>WCA Podium Certificate Generator</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Playfair+Display:wght@700&family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
    <style>
        body { font-family: 'Montserrat', sans-serif; background: #1a1a1a; color: white; text-align: center; padding: 20px; }
        .ui-panel { background: white; color: #333; padding: 20px; border-radius: 12px; display: inline-block; margin-bottom: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        input, select, button { padding: 10px; margin: 5px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; }
        .toggle-group { margin: 10px; display: flex; align-items: center; justify-content: center; gap: 10px; font-weight: bold; }
        button { background: #d4af37; color: white; border: none; font-weight: bold; cursor: pointer; padding: 10px 20px; }
        button:hover { background: #b8860b; }
        canvas { max-width: 80vw; height: auto; border: 1px solid #ccc; background: white; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="ui-panel">
        <input type="text" id="compId" placeholder="Comp ID (e.g. StevenageMay2026)">
        <select id="event">
            <option value="333">3x3x3 Cube</option>
            <option value="222">2x2x2 Cube</option>
            <option value="444">4x4x4 Cube</option>
            <option value="pyram">Pyraminx</option>
            <option value="clock">Clock</option>
        </select>
        <div class="toggle-group">
            <input type="checkbox" id="showSign" checked> <span>Include Signature Line</span>
        </div>
        <button onclick="downloadPodiumPDF()" style="background:#e67e22;">Download Podium PDFs (Top 3)</button>
        <p id="status" style="font-size: 11px; color: #888; margin: 5px 0 0 0;">Enter Comp ID and select event to generate podium.</p>
    </div>

    <br>
    <canvas id="certCanvas" width="3508" height="2480" style="display:none;"></canvas>
    <h3>Last Generated Preview:</h3>
    <canvas id="previewCanvas" width="3508" height="2480" style="display:inline-block; max-width: 400px;"></canvas>

    <script>
        const canvas = document.getElementById('certCanvas');
        const preview = document.getElementById('previewCanvas');
        const ctx = canvas.getContext('2d');
        const pCtx = preview.getContext('2d');
        const logo = new Image();
        logo.src = "logo.png"; 

        async function downloadPodiumPDF() {
            const { jsPDF } = window.jspdf;
            const status = document.getElementById('status');
            const compId = document.getElementById('compId').value.trim();
            const eventId = document.getElementById('event').value;

            if (!compId) { alert("Please enter a Competition ID"); return; }
            status.innerText = "Fetching podium data...";

            try {
                const url = `https://www.worldcubeassociation.org/api/v0/competitions/${compId}/wcif/public`;
                const response = await fetch(url);
                if (!response.ok) throw new Error("Competition not found.");
                
                const data = await response.json();
                const wcEvent = data.events.find(e => e.id === eventId);
                const finalRound = wcEvent.rounds[wcEvent.rounds.length - 1];
                
                // Get top 3
                const winners = finalRound.results.filter(r => r.ranking >= 1 && r.ranking <= 3)
                                  .sort((a, b) => a.ranking - b.ranking);

                if (winners.length === 0) throw new Error("No results found for this event yet.");

                const pdf = new jsPDF({
                    orientation: 'landscape',
                    unit: 'px',
                    format: [canvas.width, canvas.height]
                });

                for (let i = 0; i < winners.length; i++) {
                    const result = winners[i];
                    const person = data.persons.find(p => p.registrantId === result.personId);
                    
                    const resStr = result.average > 0 ? (result.average / 100).toFixed(2) + " Average" : (result.best / 100).toFixed(2) + " Single";
                    const rankSuffix = ["th", "st", "nd", "rd"][result.ranking] || "th";

                    // Render to hidden canvas
                    render(person.name, person.wcaId || "NEW", data.name, document.getElementById('event').selectedOptions[0].text, `${result.ranking}${rankSuffix} Place`, resStr);
                    
                    // Add to PDF
                    const imgData = canvas.toDataURL('image/jpeg', 0.9);
                    if (i > 0) pdf.addPage([canvas.width, canvas.height], 'landscape');
                    pdf.addImage(imgData, 'JPEG', 0, 0, canvas.width, canvas.height);
                    
                    // Update preview display
                    pCtx.drawImage(canvas, 0, 0, preview.width, preview.height);
                }

                pdf.save(`${compId}_${eventId}_Podium.pdf`);
                status.innerText = "Podium PDF Downloaded!";
            } catch (err) {
                status.innerText = "Error: " + err.message;
            }
        }

        function render(name, id, comp, event, rank, result) {
            const showSign = document.getElementById('showSign').checked;
            ctx.fillStyle = "#ffffff"; 
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = "#1a1a1a";
            ctx.lineWidth = 30; ctx.strokeRect(60, 60, canvas.width - 120, canvas.height - 120);
            ctx.strokeStyle = "#d4af37";
            ctx.lineWidth = 12; ctx.strokeRect(115, 115, canvas.width - 230, canvas.height - 230);

            if (logo.complete && logo.naturalHeight !== 0) {
                ctx.drawImage(logo, 200, 200, 350, 350);
            }

            ctx.textAlign = "center";
            ctx.fillStyle = "#1a1a1a";
            ctx.font = "bold 70px Montserrat";
            ctx.fillText("WORLD CUBE ASSOCIATION", canvas.width / 2, 380);
            ctx.font = "600 50px Montserrat"; ctx.fillStyle = "#555";
            ctx.fillText("OFFICIAL CERTIFICATE OF ACHIEVEMENT", canvas.width / 2, 480);

            ctx.fillStyle = "#d4af37";
            let fontSize = 220;
            ctx.font = `bold ${fontSize}px 'Cinzel Decorative'`;
            while (ctx.measureText(name.toUpperCase()).width > canvas.width * 0.8) {
                fontSize -= 5;
                ctx.font = `bold ${fontSize}px 'Cinzel Decorative'`;
            }
            ctx.fillText(name.toUpperCase(), canvas.width / 2, 950);

            ctx.fillStyle = "#1a1a1a";
            ctx.font = "bold 55px Montserrat";
            ctx.fillText("WCA ID: " + id, canvas.width / 2, 1070);
            ctx.font = "600 65px Montserrat"; ctx.fillStyle = "#777";
            ctx.fillText("has officially achieved", canvas.width / 2, 1300);
            ctx.font = "bold 180px 'Playfair Display'"; ctx.fillStyle = "#1a1a1a";
            ctx.fillText(rank.toUpperCase(), canvas.width / 2, 1520);
            ctx.font = "bold 80px Montserrat";
            ctx.fillText(`in ${event}`, canvas.width / 2, 1680);
            ctx.font = "700 110px Montserrat"; ctx.fillStyle = "#d4af37";
            ctx.fillText(`RESULT: ${result}`, canvas.width / 2, 1900);
            ctx.fillStyle = "#1a1a1a";
            ctx.font = "bold 60px Montserrat";
            ctx.fillText(comp.toUpperCase(), canvas.width / 2, 2220);

            if (showSign) {
                ctx.strokeStyle = "#1a1a1a"; ctx.lineWidth = 4;
                ctx.beginPath(); ctx.moveTo(canvas.width - 850, 2220); ctx.lineTo(canvas.width - 250, 2220); ctx.stroke();
                ctx.font = "bold 35px Montserrat";
                ctx.fillText("OFFICIAL DELEGATE SIGNATURE", canvas.width - 550, 2280);
            }
        }
    </script>
</body>
</html>
