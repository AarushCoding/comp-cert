<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>WCA Official Certificate Engine</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Playfair+Display:wght@700&family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
    <style>
        body { font-family: 'Montserrat', sans-serif; background: #1a1a1a; color: white; text-align: center; padding: 20px; }
        .ui-panel { background: white; color: #333; padding: 25px; border-radius: 15px; display: inline-block; margin-bottom: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.5); }
        input, select, button { padding: 12px; margin: 5px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; }
        .toggle-group { margin: 15px; display: flex; align-items: center; justify-content: center; gap: 10px; font-weight: bold; }
        button { background: #d4af37; color: white; border: none; font-weight: bold; cursor: pointer; padding: 12px 25px; transition: 0.2s; }
        button:hover { background: #b8860b; transform: translateY(-1px); }
        .status-msg { font-size: 12px; color: #888; margin-top: 10px; }
        canvas { max-width: 90vw; height: auto; border: 1px solid #ccc; background: white; margin-top: 20px; box-shadow: 0 0 20px rgba(0,0,0,0.3); }
    </style>
</head>
<body>

    <div class="ui-panel">
        <h2 style="margin-top:0; color:#1a1a1a">🏆 WCA Certificate Engine</h2>
        <input type="text" id="compId" placeholder="Competition ID (e.g. StevenageMay2026)">
        <input type="text" id="wcaId" placeholder="WCA ID (Optional for Individual)">
        
        <select id="event">
            <optgroup label="Cubes">
                <option value="333">3x3x3 Cube</option>
                <option value="222">2x2x2 Cube</option>
                <option value="444">4x4x4 Cube</option>
                <option value="555">5x5x5 Cube</option>
                <option value="666">6x6x6 Cube</option>
                <option value="777">7x7x7 Cube</option>
            </optgroup>
            <optgroup label="Side Events">
                <option value="333oh">3x3x3 One-Handed</option>
                <option value="clock">Clock</option>
                <option value="minx">Megaminx</option>
                <option value="pyram">Pyraminx</option>
                <option value="skewb">Skewb</option>
                <option value="sq1">Square-1</option>
            </optgroup>
            <optgroup label="Blind & FMC">
                <option value="333bf">3x3x3 Blindfolded</option>
                <option value="444bf">4x4x4 Blindfolded</option>
                <option value="555bf">5x5x5 Blindfolded</option>
                <option value="333mbf">3x3x3 Multi-Blind</option>
                <option value="333fm">3x3x3 Fewest Moves</option>
            </optgroup>
        </select>

        <div class="toggle-group">
            <input type="checkbox" id="showSign" checked> <span>Include Signature Line</span>
        </div>

        <button onclick="fetchIndividual()">Individual Cert</button>
        <button onclick="downloadPodiumPDF()" style="background:#e67e22;">Download Podium (3 Pages)</button>
        
        <p id="status" class="status-msg">Ensure <b>logo.png</b> is in the same folder.</p>
    </div>

    <br>
    <canvas id="certCanvas" width="3508" height="2480"></canvas>

    <script>
        const canvas = document.getElementById('certCanvas');
        const ctx = canvas.getContext('2d');
        const status = document.getElementById('status');
        const logo = new Image();
        logo.src = "logo.png"; 

        // Events ranked by Single Best
        const blindEvents = ['333bf', '444bf', '555bf', '333mbf', '333fm'];

        function formatWcaTime(cs, eventId) {
            if (cs <= 0) return "DNF";
            if (eventId === '333fm') return (cs / 100) + " Moves";
            if (eventId === '333mbf') {
                const missed = cs % 100;
                const seconds = Math.floor(cs / 100) % 1e5;
                const solved = 99 - Math.floor(cs / 1e7);
                const attempted = solved + missed;
                const mins = Math.floor(seconds / 60);
                const secs = seconds % 60;
                return `${solved}/${attempted} in ${mins}:${secs.toString().padStart(2, '0')}`;
            }
            const totalSecs = cs / 100;
            if (totalSecs < 60) return totalSecs.toFixed(2);
            const mins = Math.floor(totalSecs / 60);
            const secs = (totalSecs % 60).toFixed(2);
            return `${mins}:${secs.padStart(5, '0')}`;
        }

        async function fetchIndividual() {
            const compId = document.getElementById('compId').value.trim();
            const wcaId = document.getElementById('wcaId').value.trim().toUpperCase();
            const eventId = document.getElementById('event').value;
            if(!compId || !wcaId) return alert("Need Comp ID and WCA ID");

            status.innerText = "Loading data...";
            try {
                const response = await fetch(`https://www.worldcubeassociation.org/api/v0/competitions/${compId}/wcif/public`);
                const data = await response.json();
                const person = data.persons.find(p => p.wcaId === wcaId);
                const event = data.events.find(e => e.id === eventId);
                let result = null;
                for (let i = event.rounds.length - 1; i >= 0; i--) {
                    const r = event.rounds[i].results.find(res => res.personId === person.registrantId);
                    if (r) { result = r; break; }
                }
                
                const isBlind = blindEvents.includes(eventId);
                const val = (isBlind || result.average <= 0) ? result.best : result.average;
                const label = (isBlind || result.average <= 0) ? "SINGLE" : "AVERAGE";
                const suffix = ["th", "st", "nd", "rd"][(result.ranking % 10 > 3 || [11,12,13].includes(result.ranking % 100)) ? 0 : result.ranking % 10];

                render(person.name, wcaId, data.name, document.getElementById('event').selectedOptions[0].text, `${result.ranking}${suffix} Place`, `${formatWcaTime(val, eventId)} ${label}`);
                status.innerText = "Done!";
            } catch (err) { status.innerText = "Error: " + err.message; }
        }

        async function downloadPodiumPDF() {
            const { jsPDF } = window.jspdf;
            const compId = document.getElementById('compId').value.trim();
            const eventId = document.getElementById('event').value;
            if(!compId) return alert("Enter Competition ID");

            status.innerText = "Fetching podium...";
            try {
                const response = await fetch(`https://www.worldcubeassociation.org/api/v0/competitions/${compId}/wcif/public`);
                const data = await response.json();
                const event = data.events.find(e => e.id === eventId);
                const round = event.rounds[event.rounds.length - 1];
                
                const winners = round.results.filter(r => r.ranking >= 1 && r.ranking <= 3 && r.best > 0).sort((a,b) => a.ranking - b.ranking);
                const pdf = new jsPDF({ orientation: 'landscape', unit: 'px', format: [canvas.width, canvas.height] });

                for (let i = 0; i < winners.length; i++) {
                    const res = winners[i];
                    const person = data.persons.find(p => p.registrantId === res.personId);
                    const isBlind = blindEvents.includes(eventId);
                    const val = (isBlind || res.average <= 0) ? res.best : res.average;
                    const label = (isBlind || res.average <= 0) ? "SINGLE" : "AVERAGE";
                    const suffix = ["th", "st", "nd", "rd"][res.ranking] || "th";

                    render(person.name, person.wcaId || "NEW", data.name, document.getElementById('event').selectedOptions[0].text, `${res.ranking}${suffix} Place`, `${formatWcaTime(val, eventId)} ${label}`);
                    
                    if (i > 0) pdf.addPage([canvas.width, canvas.height], 'landscape');
                    pdf.addImage(canvas.toDataURL('image/jpeg', 0.95), 'JPEG', 0, 0, canvas.width, canvas.height);
                }
                pdf.save(`${compId}_${eventId}_Podium.pdf`);
                status.innerText = "Podium Saved!";
            } catch (err) { status.innerText = "Error: " + err.message; }
        }

        function render(name, id, comp, event, rank, result) {
            ctx.fillStyle = "#ffffff";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = "#1a1a1a"; ctx.lineWidth = 30; ctx.strokeRect(60, 60, canvas.width - 120, canvas.height - 120);
            ctx.strokeStyle = "#d4af37"; ctx.lineWidth = 12; ctx.strokeRect(115, 115, canvas.width - 230, canvas.height - 230);

            if (logo.complete && logo.naturalHeight !== 0) {
                ctx.drawImage(logo, 200, 200, 350, 350);
            }

            ctx.textAlign = "center"; ctx.fillStyle = "#1a1a1a";
            ctx.font = "bold 70px Montserrat"; ctx.fillText("WORLD CUBE ASSOCIATION", canvas.width / 2, 380);
            ctx.font = "bold 50px Montserrat"; ctx.fillStyle = "#555"; ctx.fillText("OFFICIAL CERTIFICATE OF ACHIEVEMENT", canvas.width / 2, 480);

            ctx.fillStyle = "#d4af37";
            let fSize = 220; ctx.font = `bold ${fSize}px 'Cinzel Decorative'`;
            while (ctx.measureText(name.toUpperCase()).width > canvas.width * 0.8) {
                fSize -= 5; ctx.font = `bold ${fSize}px 'Cinzel Decorative'`;
            }
            ctx.fillText(name.toUpperCase(), canvas.width / 2, 950);

            ctx.fillStyle = "#1a1a1a"; ctx.font = "bold 55px Montserrat"; ctx.fillText("WCA ID: " + id, canvas.width / 2, 1070);
            ctx.font = "600 65px Montserrat"; ctx.fillStyle = "#777"; ctx.fillText("has officially secured", canvas.width / 2, 1300);
            ctx.font = "bold 180px 'Playfair Display'"; ctx.fillStyle = "#1a1a1a"; ctx.fillText(rank.toUpperCase(), canvas.width / 2, 1520);
            ctx.font = "bold 85px Montserrat"; ctx.fillText(`in the ${event} event`, canvas.width / 2, 1680);
            ctx.font = "700 110px Montserrat"; ctx.fillStyle = "#d4af37"; ctx.fillText(`RESULT: ${result}`, canvas.width / 2, 1920);

            ctx.fillStyle = "#1a1a1a"; ctx.font = "bold 65px Montserrat"; ctx.fillText(comp.toUpperCase(), canvas.width / 2, 2220);

            if (document.getElementById('showSign').checked) {
                ctx.strokeStyle = "#1a1a1a"; ctx.lineWidth = 4;
                ctx.beginPath(); ctx.moveTo(canvas.width - 850, 2220); ctx.lineTo(canvas.width - 250, 2220); ctx.stroke();
                ctx.font = "bold 35px Montserrat"; ctx.fillText("OFFICIAL DELEGATE SIGNATURE", canvas.width - 550, 2280);
            }
        }

        window.onload = () => render("Competitor Name", "2026ID01", "Competition Name", "3x3x3 Cube", "1st Place", "8.50 Average");
    </script>
</body>
</html>
