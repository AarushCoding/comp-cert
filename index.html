<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Official WCA Certificate Generator</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Great+Vibes&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Montserrat', sans-serif; background: #1a1a1a; color: white; text-align: center; padding: 20px; }
        .ui-panel { background: white; color: #333; padding: 25px; border-radius: 15px; display: inline-block; margin-bottom: 30px; box-shadow: 0 10px 40px rgba(0,0,0,0.5); }
        input, select, button { padding: 12px; margin: 8px; border: 1.5px solid #eee; border-radius: 8px; font-size: 14px; }
        button { background: #d4af37; color: white; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background: #b8860b; transform: scale(1.02); }
        canvas { max-width: 90vw; border: 1px solid #000; background: white; }
    </style>
</head>
<body>

    <div class="ui-panel">
        <h2 style="margin-top:0">🏆 WCA Certificate Pro</h2>
        <input type="text" id="compId" placeholder="Comp ID (e.g. StevenageMay2026)">
        <input type="text" id="wcaId" placeholder="WCA ID (e.g. 2026DOE01)">
        <select id="event">
            <option value="333">3x3x3 Cube</option>
            <option value="222">2x2x2 Cube</option>
            <option value="444">4x4x4 Cube</option>
            <option value="pyram">Pyraminx</option>
        </select>
        <br>
        <button onclick="fetchAndGenerate()">Generate Official Cert</button>
        <button onclick="downloadCert()" style="background:#2980b9;">Download High-Res PNG</button>
        <p id="status" style="font-size: 11px; color: #999;">Must be run from a local server (e.g. VS Code Live Server)</p>
    </div>

    <br>
    <canvas id="certCanvas" width="2480" height="3508"></canvas>

    <script>
        const canvas = document.getElementById('certCanvas');
        const ctx = canvas.getContext('2d');
        
        // 1. Pre-load the logo from GitHub
        const logo = new Image();
        logo.crossOrigin = "anonymous"; 
        logo.src = "https://raw.githubusercontent.com/thewca/worldcubeassociation.org/master/app/assets/images/WCAlogo_notext.png";

        async function fetchAndGenerate() {
            const status = document.getElementById('status');
            const compId = document.getElementById('compId').value.trim();
            const wcaId = document.getElementById('wcaId').value.trim().toUpperCase();
            const eventId = document.getElementById('event').value;

            if (!logo.complete) {
                status.innerText = "Error: Logo still loading. Wait a second and try again.";
                return;
            }

            status.innerText = "Fetching results...";

            try {
                // Fetching from official WCA API
                const url = `https://www.worldcubeassociation.org/api/v0/competitions/${compId}/wcif/public`;
                const response = await fetch(url);
                if (!response.ok) throw new Error("Competition not found.");
                
                const data = await response.json();
                const person = data.persons.find(p => p.wcaId === wcaId);
                if (!person) throw new Error("Competitor not found in this competition.");

                const wcEvent = data.events.find(e => e.id === eventId);
                let bestRes = null;
                for (let i = wcEvent.rounds.length - 1; i >= 0; i--) {
                    const r = wcEvent.rounds[i].results.find(res => res.personId === person.registrantId);
                    if (r) { bestRes = r; break; }
                }

                if (!bestRes) throw new Error("No results found for this event.");

                const resStr = bestRes.average > 0 ? (bestRes.average / 100).toFixed(2) + " Average" : (bestRes.best / 100).toFixed(2) + " Single";
                const rank = bestRes.ranking;
                const suffix = ["th", "st", "nd", "rd"][(rank % 10 > 3 || [11,12,13].includes(rank % 100)) ? 0 : rank % 10];

                render(person.name, wcaId, data.name, document.getElementById('event').selectedOptions[0].text, `${rank}${suffix} Place`, resStr);
                status.innerText = "Success! Official Certificate Generated.";
            } catch (err) {
                status.innerText = "Error: " + err.message;
            }
        }

        function render(name, id, comp, event, rank, result) {
            // Paper Background
            ctx.fillStyle = "#fffcf5";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Double Frame
            ctx.strokeStyle = "#1a1a1a";
            ctx.lineWidth = 15;
            ctx.strokeRect(60, 60, canvas.width - 120, canvas.height - 120);
            ctx.strokeStyle = "#d4af37";
            ctx.lineWidth = 8;
            ctx.strokeRect(100, 100, canvas.width - 200, canvas.height - 200);

            // DRAW LOGO (Now safe because of .complete check)
            const logoW = 400;
            const logoH = (logo.height / logo.width) * logoW;
            ctx.drawImage(logo, canvas.width/2 - logoW/2, 280, logoW, logoH);

            // Header
            ctx.textAlign = "center";
            ctx.fillStyle = "#1a1a1a";
            ctx.font = "bold 65px Montserrat";
            ctx.fillText("WORLD CUBE ASSOCIATION", canvas.width/2, 820);

            ctx.font = "italic 55px 'Playfair Display'";
            ctx.fillText("Official Certificate of Achievement", canvas.width/2, 920);

            // Name
            ctx.fillStyle = "#d4af37";
            ctx.font = "bold 180px 'Cinzel Decorative'";
            ctx.fillText(name.toUpperCase(), canvas.width/2, 1250);

            ctx.fillStyle = "#7f8c8d";
            ctx.font = "bold 55px Montserrat";
            ctx.fillText("WCA ID: " + id, canvas.width/2, 1340);

            // Achievement
            ctx.fillStyle = "#1a1a1a";
            ctx.font = "italic 60px 'Playfair Display'";
            ctx.fillText("has officially secured", canvas.width/2, 1600);

            ctx.font = "bold 150px 'Playfair Display'";
            ctx.fillText(rank.toUpperCase(), canvas.width/2, 1800);

            ctx.font = "70px Montserrat";
            ctx.fillText(`in ${event}`, canvas.width/2, 1950);

            ctx.font = "italic 90px 'Great Vibes'";
            ctx.fillText(`with a result of ${result}`, canvas.width/2, 2150);

            // Competition Info
            ctx.font = "bold 60px Montserrat";
            ctx.fillText(comp.toUpperCase(), canvas.width/2, 2900);
            
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(canvas.width/2 - 500, 2950);
            ctx.lineTo(canvas.width/2 + 500, 2950);
            ctx.stroke();

            ctx.font = "40px Montserrat";
            ctx.fillText("OFFICIAL WCA COMPETITION", canvas.width/2, 3020);
        }

        function downloadCert() {
            const link = document.createElement('a');
            link.download = `WCA_Cert_${document.getElementById('wcaId').value}.png`;
            link.href = canvas.toDataURL('image/png', 1.0);
            link.click();
        }
    </script>
</body>
</html>
